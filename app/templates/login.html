<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Clinic System</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, Arial, sans-serif; background: #0a2e36; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 40px; border-radius: 12px; width: 340px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        h1 { font-size: 22px; margin-bottom: 8px; color: #0a2e36; }
        p { font-size: 13px; color: #64748b; margin-bottom: 24px; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; margin-bottom: 14px; }
        button { width: 100%; background: #0f6e56; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 15px; cursor: pointer; }
        button:hover { background: #085041; }
        .error { color: #a32d2d; background: #fcebeb; padding: 10px; border-radius: 6px; margin-bottom: 14px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🦷 Clinic Staff Login</h1>
        <p>Sign in to manage patients and inventory</p>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
